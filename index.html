<!DOCTYPE html>
<html lang="fr">  
<head>  
  <meta charset="UTF-8" />  
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />  
  <title>Direction Hub • Grey Corner</title>    
  <script src="https://cdn.tailwindcss.com"></script>    
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>    
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">    
  <style>  
    :root {  
      --bg-deep:   #dbeafe;  
      --bg-base:   #eff6ff;  
      --surface:        rgba(255,255,255,.68);  
      --surface2:       rgba(255,255,255,.90);  
      --surface-soft:   rgba(255,255,255,.50);  
      --stroke:         rgba(30,64,175,.09);  
      --stroke-med:     rgba(30,64,175,.15);  
      --stroke-strong:  rgba(30,64,175,.22);  
      --text:    #1e3a5f;  
      --muted:   #1d4ed8;  
      --muted2:  rgba(29,78,216,.70);  
      --muted3:  rgba(29,78,216,.50);  
      --accent:    #f59e0b;  
      --accentBg:  rgba(245,158,11,.10);  
      --accentBdr: rgba(245,158,11,.30);  
      --ok:      #059669;  
      --amber:   #b45309;  
      --crit:    #dc2626;  
      --sky:     #0284c7;  
      --skyBg:   rgba(2,132,199,.08);  
      --skyBdr:  rgba(2,132,199,.25);  
      --okBg:    rgba(5,150,105,.08);  
      --amberBg: rgba(180,83,9,.10);  
      --critBg:  rgba(220,38,38,.08);  
      --chip-p-bg:  rgba(5,150,105,.12);  --chip-p-fg:  #065f46;  --chip-p-bdr: rgba(5,150,105,.28);  
      --chip-r-bg:  rgba(99,102,241,.10); --chip-r-fg:  #3730a3;  --chip-r-bdr: rgba(99,102,241,.25);  
      --chip-c-bg:  rgba(245,158,11,.12); --chip-c-fg:  #92400e;  --chip-c-bdr: rgba(245,158,11,.28);  
      --chip-sky-bg: rgba(2,132,199,.12); --chip-sky-fg: #0c4a6e; --chip-sky-bdr: rgba(2,132,199,.28);  
      --shadow-card: 0 8px 28px rgba(30,64,175,.08), 0 2px 8px rgba(30,64,175,.04);  
      --shadow-lg:   0 20px 60px rgba(30,64,175,.12), 0 4px 16px rgba(30,64,175,.06);  
    }  
    *, *::before, *::after { box-sizing: border-box; }  
    html, body { height: 100%; }  
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }  
    body {  
      margin: 0; min-height: 100dvh; background: #f5f9fe; color: var(--text);  
      font-family: "Plus Jakarta Sans", system-ui, -apple-system, sans-serif;  
      -webkit-tap-highlight-color: transparent; overflow-x: hidden;  
    }  
    ::-webkit-scrollbar { width: 3px; height: 3px; }  
    ::-webkit-scrollbar-thumb { background: rgba(30,64,175,.18); border-radius: 999px; }  
  
    .glass-card {  
      background: linear-gradient(160deg, var(--surface2) 0%, var(--surface) 100%);  
      border: 1px solid var(--stroke-med);  
      box-shadow: var(--shadow-card);  
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);  
    }  
    .hTitle { font-family: "DM Serif Display", Georgia, serif; letter-spacing: -.02em; color: #0f2744; font-weight: 400; }  
    .smallCaps { font-weight: 800; text-transform: uppercase; letter-spacing: .13em; font-size: 10px; color: var(--muted2); }  
    .accent-bar { height: 2px; width: 100%; background: linear-gradient(90deg, var(--accent) 0%, rgba(245,158,11,0) 100%); border-radius: 999px; opacity: .80; }  
    .accent-bar-blue { height: 2px; width: 100%; background: linear-gradient(90deg, rgba(29,78,216,.55) 0%, rgba(29,78,216,0) 100%); border-radius: 999px; }  
    .accent-bar-sky { height: 2px; width: 100%; background: linear-gradient(90deg, rgba(2,132,199,.65) 0%, rgba(2,132,199,0) 100%); border-radius: 999px; }  
  
    .view-btn {  
      color: var(--muted3); border: 1px solid transparent;  
      transition: background .2s ease, color .2s ease, border-color .2s ease, box-shadow .2s ease;  
      background: transparent;  
    }  
    .view-btn:hover:not(.active):not(.active-sky) { background: rgba(29,78,216,.06); color: var(--muted); }  
    .view-btn.active {  
      background: rgba(245,158,11,.14); color: #92400e;  
      border-color: rgba(245,158,11,.38);  
      box-shadow: inset 0 0 0 1px rgba(245,158,11,.12), 0 2px 8px rgba(245,158,11,.10);  
    }  
    .view-btn.active-sky {  
      background: var(--skyBg); color: var(--sky);  
      border-color: var(--skyBdr);  
      box-shadow: inset 0 0 0 1px rgba(2,132,199,.10), 0 2px 8px rgba(2,132,199,.10);  
    }  
  
    .inpt {  
      width: 100%; background: rgba(255,255,255,.88); border: 1px solid var(--stroke-med);  
      border-radius: 14px; padding: 11px 14px; color: var(--text);  
      font-family: "Plus Jakarta Sans", sans-serif; font-weight: 700; font-size: 12px;  
      outline: none; transition: border-color .2s ease, box-shadow .2s ease;  
    }  
    .inpt:focus { border-color: rgba(245,158,11,.55); box-shadow: 0 0 0 3px rgba(245,158,11,.12); }  
  
    .btn-login {  
      width: 100%; border-radius: 14px; padding: 12px 14px; font-size: 11px; font-weight: 900;  
      letter-spacing: .12em; text-transform: uppercase;  
      background: linear-gradient(135deg, rgba(245,158,11,.18), rgba(245,158,11,.10));  
      color: #78350f; border: 1px solid rgba(245,158,11,.38);  
      transition: transform .15s ease, box-shadow .2s ease; cursor: pointer;  
    }  
    .btn-login:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(245,158,11,.18); }  
  
    .btn-action { transition: transform .15s ease, box-shadow .2s ease; cursor: pointer; }  
    .btn-action:hover { transform: translateY(-1px); }  
  
    .spin { width: 28px; height: 28px; border-radius: 999px; border: 3px solid rgba(30,64,175,.10); border-top-color: var(--accent); animation: sp .85s linear infinite; }  
    @keyframes sp { to { transform: rotate(360deg); } }  
  
    .staff-card {  
      border-left-width: 3px; transition: transform .18s ease, box-shadow .18s ease;  
      cursor: pointer; position: relative; overflow: hidden;  
      background: linear-gradient(160deg, rgba(255,255,255,.90), rgba(255,255,255,.72));  
    }  
    .staff-card:hover  { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(30,64,175,.12); }  
  
    .status-dot { position: absolute; top: 10px; right: 10px; width: 7px; height: 7px; border-radius: 999px; box-shadow: 0 0 0 5px rgba(255,255,255,.35); }  
    .arrive-time { position: absolute; bottom: 12px; right: 12px; font-family: "DM Serif Display", serif; font-size: 14px; color: rgba(15,39,68,.72); }  
  
    .status-green  { border-left-color: var(--ok) !important; background: var(--okBg); }  
    .status-orange { border-left-color: var(--amber) !important; background: var(--amberBg); }  
    .status-red    { border-left-color: var(--crit) !important; background: var(--critBg); }  
    .status-flash  { border-left-color: var(--crit) !important; background: var(--critBg); animation: flash-red 1s infinite; }  
    @keyframes flash-red { 50% { border-left-width: 5px; } }  
    .status-off { border-left-color: rgba(148,163,184,.45) !important; background: rgba(255,255,255,.32); opacity: .62; }  
    .status-conge { border-left-color: var(--sky) !important; background: var(--skyBg); }  
  
    .chip { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 999px; border: 1px solid var(--stroke-med); font-weight: 900; font-size: 11px; background: rgba(255,255,255,.70); }  
    .chip-p   { background: var(--chip-p-bg); color: var(--chip-p-fg); border-color: var(--chip-p-bdr); }  
    .chip-c   { background: var(--chip-c-bg); color: var(--chip-c-fg); border-color: var(--chip-c-bdr); }  
    .chip-sky { background: var(--chip-sky-bg); color: var(--chip-sky-fg); border-color: var(--chip-sky-bdr); }  
  
    .rc-table { width: 100%; border-collapse: collapse; table-layout: fixed; }  
    .rc-table th, .rc-table td { border: 1px solid rgba(30,64,175,.07); padding: 8px 5px; font-size: 11px; }  
    .rc-table th { background: rgba(255,255,255,.55); font-weight: 900; text-transform: uppercase; font-size: 9px; color: var(--muted2); }  
  
    .drawer { border: 1px solid var(--stroke-med); border-radius: 22px; overflow: clip; background: linear-gradient(160deg, rgba(255,255,255,.86), rgba(255,255,255,.66)); }  
    .drawer summary { list-style: none; cursor: pointer; padding: 16px 18px; display: flex; align-items: center; justify-content: space-between; }  
    .drawer[open] .chev { transform: rotate(180deg); }  
    .drawer .body { padding: 0 18px 18px 18px; }  
  
    .modal-active  { display: flex !important; animation: slideUp .32s cubic-bezier(0,.1,.2,1); }  
    .modal-closing { animation: slideDown .26s forwards; }  
    @keyframes slideUp   { from { transform: translateY(100%); opacity: .5; } to { transform: translateY(0); opacity: 1; } }  
    @keyframes slideDown { from { transform: translateY(0); opacity: 1; } to { transform: translateY(100%); opacity: 0; } }  
    .modal-overlay { background: rgba(10,30,65,.32); backdrop-filter: blur(12px); }  
    .modal-sheet { background: linear-gradient(160deg, rgba(255,255,255,.97), rgba(239,246,255,.94)); border: 1px solid var(--stroke-med); box-shadow: var(--shadow-lg); }  
    .handle { width: 38px; height: 4px; background: rgba(30,64,175,.16); border-radius: 999px; margin: 0 auto 16px auto; }  
  
    .sync-modal { position: fixed; inset: 0; z-index: 60; background: rgba(10,30,65,.35); backdrop-filter: blur(12px); display: none; align-items: center; justify-content: center; padding: 16px; }  
    .sync-modal.open { display: flex; }  
    .sync-panel { background: white; border-radius: 24px; width: 100%; max-width: 480px; box-shadow: var(--shadow-lg); }  
    .sync-log { font-family: monospace; font-size: 11px; overflow-y: auto; background: rgba(30,64,175,.04); border-radius: 12px; padding: 12px; max-height: 200px; }  
  
    .mini-solde { height: 4px; border-radius: 999px; background: rgba(30,64,175,.08); overflow: hidden; margin-top: 6px; }  
    .mini-solde-fill { height: 4px; border-radius: 999px; }  
    .conge-row { border: 1px solid var(--stroke-med); border-radius: 16px; padding: 14px; background: white; margin-bottom: 10px; cursor: pointer; transition: transform 0.2s; }  
    .conge-row:hover { transform: scale(1.01); }
  </style>  
</head>

// Helpers
function esc(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s){ return esc(s); }
function titleCase(s){ const t=String(s||"").toLowerCase(); return t?t.charAt(0).toUpperCase()+t.slice(1):""; }
function empIdOf(emp){ return `${String(emp?.nom||"").trim().toUpperCase().replace(/\s+/g,"_")}_${String(emp?.prenom||"").trim().toUpperCase().replace(/\s+/g,"_")}`; }
function normName(s){ return (s||"").trim().toUpperCase().replace(/\s+/g,' '); }
function makeEmpId(nom,prenom){ return `${normName(nom)}_${normName(prenom)}`.replace(/\s+/g,'_'); }
function todayISO(){ return new Intl.DateTimeFormat('fr-CA',{timeZone:'Africa/Casablanca',year:'numeric',month:'2-digit',day:'2-digit'}).format(new Date()); }
function monthKeyFromISO(iso){ return (iso||"").slice(0,7); }
function isoFromMonthKey(mk){ return mk+"-01"; }
function fmtFR(iso){ if(!iso)return ""; const [y,m,d]=iso.split("-"); return `${d}/${m}/${y}`; }
function safeTime(t){ const s=String(t??"").trim(); return /^([01]?\d|2[0-3]):[0-5]\d$/.test(s.slice(0,5)) ? s.slice(0,5) : ""; }
function addDaysISO(iso,delta){ const d=new Date(iso); d.setUTCDate(d.getUTCDate()+delta); return d.toISOString().split('T')[0]; }

function getTimeDiff(a,p,id){  
  if(!a || !p) return 0;  
  const [ha,ma]=a.split(':').map(Number),[hp,mp]=p.split(':').map(Number);  
  const d=(ha*60+ma)-(hp*60+mp); return d>0?d:0;  
}  
function diffFromEntry(entry,empId){ return entry ? getTimeDiff(entry.hA, entry.hP, empId) : 0; }  

function getStatusClass(diff,isOff,hasArrived,isConge){  
  if(isConge) return 'status-conge';  
  if(hasArrived){ if(diff<=0)return'status-green'; if(diff<30)return'status-orange'; return'status-red'; }  
  if(isOff) return 'status-off'; return '';  
}  
function getDotColor(diff,isOff,hasArrived,isConge){  
  if(isConge) return 'var(--sky)';  
  if(hasArrived){ if(diff<=0)return'var(--ok)'; if(diff<30)return'var(--amber)'; return'var(--crit)'; }  
  if(isOff) return '#cbd5e1'; return 'transparent';  
}  

// OBJET CONGÉS (CORRIGÉ)
const cgDash = {  
  _data:null, _byEmpId:null, filter:'all', _rcSolde:{},  
  
  async load(){  
    try{  
      const snap=await database.ref(CONGES_PATH).once('value');  
      const val=snap.val()||{}; this._data={}; this._byEmpId={};  
      Object.entries(val).forEach(([cin,cinConges])=>{  
        const list=Object.entries(cinConges||{}).map(([id,c])=>({id,cin,...c}));  
        list.forEach(c=>{ const eid=c.empId; if(eid){this._byEmpId[eid]=this._byEmpId[eid]||[];this._byEmpId[eid].push(c);} });  
      });  
    }catch(e){ this._data={}; this._byEmpId={}; }  
  },  

  allFlat(){ return this._byEmpId ? Object.values(this._byEmpId).flat() : []; },

  isOnConge(empId,dateISO){  
    if(!this._byEmpId || !this._byEmpId[empId]) return false;  
    return this._byEmpId[empId].some(c=>c.statut==='approuvé'&&(c.dateDebut||'')<=dateISO&&(c.dateFin||'')>=dateISO);  
  },

  getActiveConge(empId,dateISO){  
    return (this._byEmpId?.[empId]||[]).find(c=>c.statut==='approuvé'&&(c.dateDebut||'')<=dateISO&&(c.dateFin||'')>=dateISO)||null;  
  },

  soldeRestant(empId){ return Math.max(0, 18 - (this._rcSolde[empId] || 0)); },

  setFilter(f){ this.filter=f; this.renderView(); },

  async renderView(){  
    if(!this._data) await this.load();  
    const today = todayISO(); 
    const all = this.allFlat();  
    const year = today.slice(0,4);  
  
    const ac = all.filter(c => c.statut === 'approuvé' && c.dateDebut <= today && c.dateFin >= today).length;  
    const up = all.filter(c => c.statut === 'approuvé' && c.dateDebut > today).length;  
    const pe = all.filter(c => c.statut === 'en_attente').length;  
  
    const summary = `<div class="glass-card rounded-2xl p-4 flex gap-3 flex-wrap mb-4">  
      <div class="flex-1 min-w-[72px] text-center rounded-xl p-3" style="background:var(--skyBg);border:1px solid var(--skyBdr)">  
        <div class="hTitle text-3xl" style="color:var(--sky)">${ac}</div><div class="smallCaps mt-1">En cours</div>  
      </div>  
      <div class="flex-1 min-w-[72px] text-center rounded-xl p-3" style="background:var(--okBg);border:1px solid rgba(5,150,105,.20)">  
        <div class="hTitle text-3xl" style="color:var(--ok)">${up}</div><div class="smallCaps mt-1">À venir</div>  
      </div>  
      <div class="flex-1 min-w-[72px] text-center rounded-xl p-3" style="background:var(--accentBg);border:1px solid var(--accentBdr)">  
        <div class="hTitle text-3xl" style="color:var(--amber)">${pe}</div><div class="smallCaps mt-1">Attente</div>  
      </div>  
    </div>`;  
  
    // ✅ CORRECTION : Utilisation de la liste complète 'equipe'
    let displayList = equipe.map(emp => {
      const id = empIdOf(emp);
      const empEntries = all.filter(c => c.empId === id);
      const totalJours = empEntries.reduce((acc, c) => acc + (Number(c.jours) || 0), 0);
      return { ...emp, empId: id, entries: empEntries, totalJours };
    });

    if(this.filter === 'actif'){  
      displayList = displayList.filter(e => e.entries.some(c => c.statut === 'approuvé' && c.dateDebut <= today && c.dateFin >= today));  
    } else if(this.filter === 'en_attente'){  
      displayList = displayList.filter(e => e.entries.some(c => c.statut === 'en_attente'));  
    }

    displayList.sort((a,b) => (a.nom + a.prenom).localeCompare(b.nom + b.prenom));

    const cards = displayList.map(emp => {  
      const isActive = emp.entries.some(c => c.statut === 'approuvé' && c.dateDebut <= today && c.dateFin >= today);  
      const isUpcoming = emp.entries.some(c => c.statut === 'approuvé' && c.dateDebut > today);  
      const isPending = emp.entries.some(c => c.statut === 'en_attente');  
  
      const badge = isActive ? `<span class="chip chip-sky text-[10px]">☀️ EN COURS</span>`  
        : isUpcoming ? `<span class="chip chip-p text-[10px]">→ À VENIR</span>`  
        : isPending ? `<span class="chip chip-c text-[10px]">⏳ ATTENTE</span>`  
        : `<span class="chip text-[10px]" style="opacity:.5">✓ OK</span>`;  
  
      const solde = this.soldeRestant(emp.empId);  
      const soldePct = Math.round((solde / 18) * 100);  
      const soldeColor = solde > 8 ? 'var(--ok)' : solde > 4 ? 'var(--amber)' : 'var(--crit)';  
  
      return `<div class="conge-row" onclick="openHistory('${escAttr(emp.nom)}','${escAttr(emp.prenom)}')">  
        <div class="flex items-start justify-between gap-2 mb-3">  
          <div>  
            <div class="text-[14px] font-extrabold" style="color:#0f2744">${esc(emp.nom)} ${esc(titleCase(emp.prenom))}</div>  
            <div class="smallCaps" style="font-size:9px">${esc(emp.poste)}</div>  
          </div>  
          ${badge}  
        </div>  
        <div class="flex items-center justify-between py-2 px-3 rounded-xl mb-2 bg-slate-50 border border-slate-100">  
          <span class="text-[11px] font-bold text-slate-500">Pris (${year})</span>  
          <span class="text-[13px] font-extrabold text-sky-600">${emp.totalJours}j</span>  
        </div>  
        <div class="mt-2">  
          <div class="flex justify-between text-[9px] font-extrabold mb-1">  
            <span class="text-slate-400">SOLDE RESTANT</span>  
            <span style="color:${soldeColor}">${solde}j / 18j</span>  
          </div>  
          <div class="mini-solde"><div class="mini-solde-fill" style="width:${Math.min(100, soldePct)}%;background:${soldeColor}"></div></div>  
        </div>  
      </div>`;  
    }).join('');  
  
    document.getElementById('dashBody').innerHTML = summary + `<div class="space-y-3">${cards}</div>`;  
    this._updateActiveBadge();  
  },

  _updateActiveBadge(){  
    const today = todayISO();
    const n = this.allFlat().filter(c => c.statut === 'approuvé' && c.dateDebut <= today && c.dateFin >= today).length;
    const badge = document.getElementById('congeActiveBadge');  
    if(n>0){ document.getElementById('congeActiveCount').textContent=n; badge.classList.remove('hidden'); }  
    else badge.classList.add('hidden');  
  }  
};

// Logique R/C & Sync
async function getMonthData(mk){  
  const dates=[]; let t=new Date(mk+"-01"); const m=t.getMonth(); 
  while(t.getMonth()===m){ dates.push(t.toISOString().split('T')[0]); t.setDate(t.getDate()+1); }
  const res = {presByDay:{}, punchByDay:{}, dates};
  await Promise.all(dates.map(async d => {
    const [pres, punch] = await Promise.all([database.ref('presences/'+d).once('value'), database.ref('punches/'+d).once('value')]);
    res.presByDay[d] = pres.val()||{}; res.punchByDay[d] = punch.val()||{};
  }));
  return res;
}

async function getMonthRCMap(mk){
    const data = await getMonthData(mk);
    const rcByEmpDay = {}; equipe.forEach(e => {
        const id = empIdOf(e); rcByEmpDay[id] = {};
        data.dates.forEach(d => {
            const p = data.presByDay[d][id]; const pn = data.punchByDay[d][id];
            if(p?.hA || pn?.hA) return;
            if(p?.off) rcByEmpDay[id][d] = "R";
            else rcByEmpDay[id][d] = "C";
        });
    });
    return {rcByEmpDay, dates:data.dates};
}

async function buildMonthlySummary(mk){
    const {rcByEmpDay, dates} = await getMonthRCMap(mk);
    const summary = {}; equipe.forEach(e => {
        const id = empIdOf(e); summary[id] = { ...e, empId:id, present:0, R:0, C:0, lateMin:0 };
        dates.forEach(d => {
            if(rcByEmpDay[id][d] === "R") summary[id].R++;
            else if(rcByEmpDay[id][d] === "C") summary[id].C++;
            else summary[id].present++;
        });
    });
    return summary;
}

// UI & Navigation
function switchMode(mode, btn){
    currentMode = mode;
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active', 'active-sky'));
    btn.classList.add(mode==='conges' ? 'active-sky' : 'active');
    dayPickWrap.classList.toggle('hidden', mode!=='day');
    monthPickWrap.classList.toggle('hidden', mode==='day' || mode==='conges');
    document.getElementById('congesFilterWrap').classList.toggle('hidden', mode!=='conges');
    updateDashboard();
}

async function updateDashboard(){
    const body = document.getElementById('dashBody');
    if(currentMode === 'conges'){
        body.innerHTML = '<div class="text-center py-10"><div class="spin mx-auto"></div></div>';
        const mk = monthKeyFromISO(todayISO());
        const summary = await buildMonthlySummary(mk);
        Object.values(summary).forEach(s => cgDash._rcSolde[s.empId] = s.C);
        await cgDash.renderView();
    } else if(currentMode === 'day'){
        const d = dayPicker.value || todayISO();
        const [pres, punch] = await Promise.all([database.ref('presences/'+d).once('value'), database.ref('punches/'+d).once('value')]);
        const data = pres.val()||{}; const pn = punch.val()||{};
        let html = '<div class="grid grid-cols-2 gap-3">';
        equipe.forEach(e => {
            const id = empIdOf(e); const entry = data[id] || {}; const pEntry = pn[id] || {};
            const ha = safeTime(entry.hA || pEntry.hA); const hp = safeTime(entry.hP || pEntry.hP);
            const isC = cgDash.isOnConge(id, d);
            const diff = ha && hp ? diffFromEntry({hA:ha, hP:hp}) : 0;
            const sClass = getStatusClass(diff, !!entry.off, !!ha, isC);
            html += `<div class="staff-card ${sClass} p-4 rounded-2xl glass-card" onclick="openHistory('${e.nom}','${e.prenom}')">
                <span class="status-dot" style="background:${getDotColor(diff, !!entry.off, !!ha, isC)}"></span>
                <div class="text-xs font-bold">${e.nom}</div>
                <div class="text-[10px] opacity-60">${titleCase(e.prenom)}</div>
                <div class="text-[10px] mt-2 font-black">${ha || (isC ? 'CONGÉ' : entry.off ? 'OFF' : '—')}</div>
            </div>`;
        });
        body.innerHTML = html + '</div>';
    } else if(currentMode === 'rc'){
        body.innerHTML = '<div class="text-center py-10"><div class="spin mx-auto"></div></div>';
        const summary = await buildMonthlySummary(monthPicker.value);
        let html = '<table class="rc-table bg-white/50 rounded-xl overflow-hidden"><thead><tr><th>Nom</th><th>P</th><th>R</th><th>C</th></tr></thead><tbody>';
        Object.values(summary).forEach(s => {
            html += `<tr><td>${s.nom}</td><td class="text-center font-bold">${s.present}</td><td class="text-center">${s.R}</td><td class="text-center text-amber-600 font-bold">${s.C}</td></tr>`;
        });
        body.innerHTML = html + '</tbody></table>';
    }
}
